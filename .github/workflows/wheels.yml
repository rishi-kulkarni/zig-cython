name: Build Wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Build wheels
        run: uv run python build.py

      - name: Inspect wheels
        run: |
          echo "Built $(ls dist/*.whl | wc -l) wheels:"
          ls dist/*.whl

      - name: Test Linux x86_64 wheel (Python 3.13)
        run: uv run --no-project --python 3.13 --with numpy --with dist/*cp313*manylinux*x86_64*.whl python -c "from zigcython._fast import fib, cumsum; import numpy as np; assert fib(10) == 55; print('fib(10) =', fib(10)); result = cumsum(np.array([1.0, 2.0, 3.0])); assert list(result) == [1.0, 3.0, 6.0]; print('cumsum =', result)"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist/*.whl

  test:
    needs: build
    strategy:
      matrix:
        include:
          - os: macos-latest
            python: "3.13"
            wheel: zigcython-0.1.0-cp313-cp313-macosx_11_0_arm64.whl
          - os: windows-latest
            python: "3.13"
            wheel: zigcython-0.1.0-cp313-cp313-win_amd64.whl
          - os: ubuntu-latest
            python: "3.10"
            wheel: zigcython-0.1.0-cp310-cp310-manylinux_2_17_x86_64.manylinux2014_x86_64.whl
          - os: ubuntu-latest
            python: "3.12"
            wheel: zigcython-0.1.0-cp312-cp312-manylinux_2_17_x86_64.manylinux2014_x86_64.whl
    runs-on: ${{ matrix.os }}
    steps:
      - uses: astral-sh/setup-uv@v5

      - uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist/

      - name: Test wheel
        shell: bash
        run: |
          uv venv --python ${{ matrix.python }} testvenv
          uv pip install --python testvenv numpy dist/${{ matrix.wheel }}
          if [ -f testvenv/bin/python ]; then
            testvenv/bin/python -c "from zigcython._fast import fib, cumsum; import numpy as np; assert fib(10) == 55; print('fib(10) =', fib(10)); result = cumsum(np.array([1.0, 2.0, 3.0])); assert list(result) == [1.0, 3.0, 6.0]; print('cumsum =', result)"
          else
            testvenv/Scripts/python.exe -c "from zigcython._fast import fib, cumsum; import numpy as np; assert fib(10) == 55; print('fib(10) =', fib(10)); result = cumsum(np.array([1.0, 2.0, 3.0])); assert list(result) == [1.0, 3.0, 6.0]; print('cumsum =', result)"
          fi
