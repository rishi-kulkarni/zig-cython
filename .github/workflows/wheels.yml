name: Build Wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Build cross-compiled wheels
        run: uv run python build.py

      - name: Build sdist
        run: uv build --sdist --out-dir dist/

      - name: Inspect artifacts
        run: |
          echo "Built $(ls dist/*.whl | wc -l) wheels + $(ls dist/*.tar.gz 2>/dev/null | wc -l) sdist:"
          ls dist/

      - name: Check manylinux x86_64 wheels with auditwheel
        run: |
          uv tool install auditwheel
          for whl in dist/*manylinux*x86_64*.whl; do
            echo "=== auditwheel show: $(basename $whl) ==="
            auditwheel show "$whl"
          done

      - name: Test all manylinux x86_64 wheels
        run: |
          for pyver in 3.10 3.11 3.12 3.13 3.14; do
            echo "=== Testing Python $pyver manylinux-x86_64 ==="
            whl=$(ls dist/*cp${pyver/./}*manylinux*x86_64*.whl)
            uv run --no-project --python "$pyver" --with numpy --with "$whl" \
              python -c "from zigcython._fast import fib, cumsum; import numpy as np; assert fib(10) == 55; result = cumsum(np.array([1.0, 2.0, 3.0])); assert list(result) == [1.0, 3.0, 6.0]; print(f'Python {\"$pyver\"}: fib(10)={fib(10)}, cumsum={result}')"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: |
            dist/*.whl
            dist/*.tar.gz

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux aarch64 — test all Python versions
          - os: ubuntu-24.04-arm
            python: "3.10"
            wheel: zigcython-0.1.0-cp310-cp310-manylinux_2_17_aarch64.manylinux2014_aarch64.whl
          - os: ubuntu-24.04-arm
            python: "3.11"
            wheel: zigcython-0.1.0-cp311-cp311-manylinux_2_17_aarch64.manylinux2014_aarch64.whl
          - os: ubuntu-24.04-arm
            python: "3.12"
            wheel: zigcython-0.1.0-cp312-cp312-manylinux_2_17_aarch64.manylinux2014_aarch64.whl
          - os: ubuntu-24.04-arm
            python: "3.13"
            wheel: zigcython-0.1.0-cp313-cp313-manylinux_2_17_aarch64.manylinux2014_aarch64.whl
          - os: ubuntu-24.04-arm
            python: "3.14"
            wheel: zigcython-0.1.0-cp314-cp314-manylinux_2_17_aarch64.manylinux2014_aarch64.whl
          # macOS arm64 — test all Python versions
          - os: macos-latest
            python: "3.10"
            wheel: zigcython-0.1.0-cp310-cp310-macosx_11_0_arm64.whl
          - os: macos-latest
            python: "3.11"
            wheel: zigcython-0.1.0-cp311-cp311-macosx_11_0_arm64.whl
          - os: macos-latest
            python: "3.12"
            wheel: zigcython-0.1.0-cp312-cp312-macosx_11_0_arm64.whl
          - os: macos-latest
            python: "3.13"
            wheel: zigcython-0.1.0-cp313-cp313-macosx_11_0_arm64.whl
          - os: macos-latest
            python: "3.14"
            wheel: zigcython-0.1.0-cp314-cp314-macosx_11_0_arm64.whl
          # Windows — test all Python versions
          - os: windows-latest
            python: "3.10"
            wheel: zigcython-0.1.0-cp310-cp310-win_amd64.whl
          - os: windows-latest
            python: "3.11"
            wheel: zigcython-0.1.0-cp311-cp311-win_amd64.whl
          - os: windows-latest
            python: "3.12"
            wheel: zigcython-0.1.0-cp312-cp312-win_amd64.whl
          - os: windows-latest
            python: "3.13"
            wheel: zigcython-0.1.0-cp313-cp313-win_amd64.whl
          - os: windows-latest
            python: "3.14"
            wheel: zigcython-0.1.0-cp314-cp314-win_amd64.whl
    runs-on: ${{ matrix.os }}
    steps:
      - uses: astral-sh/setup-uv@v5

      - uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist/

      - name: Test wheel
        shell: bash
        run: |
          uv venv --python ${{ matrix.python }} testvenv
          uv pip install --python testvenv numpy dist/${{ matrix.wheel }}
          if [ -f testvenv/bin/python ]; then
            testvenv/bin/python -c "from zigcython._fast import fib, cumsum; import numpy as np; assert fib(10) == 55; print('fib(10) =', fib(10)); result = cumsum(np.array([1.0, 2.0, 3.0])); assert list(result) == [1.0, 3.0, 6.0]; print('cumsum =', result)"
          else
            testvenv/Scripts/python.exe -c "from zigcython._fast import fib, cumsum; import numpy as np; assert fib(10) == 55; print('fib(10) =', fib(10)); result = cumsum(np.array([1.0, 2.0, 3.0])); assert list(result) == [1.0, 3.0, 6.0]; print('cumsum =', result)"
          fi
