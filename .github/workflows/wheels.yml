name: Build Wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Build wheels
        run: uv run python build.py

      - name: Inspect wheels
        run: |
          for whl in dist/*.whl; do
            echo "=== $whl ==="
            unzip -l "$whl"
            echo
          done

      - name: Test Linux wheel
        run: uv run --no-project --python 3.13 --with numpy --with dist/*linux*.whl python -c "from zigcython._fast import fib, cumsum; import numpy as np; assert fib(10) == 55; print('fib(10) =', fib(10)); result = cumsum(np.array([1.0, 2.0, 3.0])); assert list(result) == [1.0, 3.0, 6.0]; print('cumsum =', result)"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist/*.whl

  test:
    needs: build
    strategy:
      matrix:
        include:
          - os: macos-latest
            wheel: zigcython-0.1.0-cp313-cp313-macosx_11_0_arm64.whl
          - os: windows-latest
            wheel: zigcython-0.1.0-cp313-cp313-win_amd64.whl
    runs-on: ${{ matrix.os }}
    steps:
      - uses: astral-sh/setup-uv@v5

      - uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist/

      - name: List wheels
        shell: bash
        run: ls -la dist/

      - name: Test wheel
        shell: bash
        run: |
          uv venv --python 3.13 testvenv
          uv pip install --python testvenv numpy dist/${{ matrix.wheel }}
          if [ -f testvenv/bin/python ]; then
            testvenv/bin/python -c "from zigcython._fast import fib, cumsum; import numpy as np; assert fib(10) == 55; print('fib(10) =', fib(10)); result = cumsum(np.array([1.0, 2.0, 3.0])); assert list(result) == [1.0, 3.0, 6.0]; print('cumsum =', result)"
          else
            testvenv/Scripts/python.exe -c "from zigcython._fast import fib, cumsum; import numpy as np; assert fib(10) == 55; print('fib(10) =', fib(10)); result = cumsum(np.array([1.0, 2.0, 3.0])); assert list(result) == [1.0, 3.0, 6.0]; print('cumsum =', result)"
          fi
